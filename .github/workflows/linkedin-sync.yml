name: LinkedIn Cert Sync

on:
  schedule:
    # Run daily at 8am EST (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run LinkedIn sync
        env:
          PROXYCURL_API_KEY: ${{ secrets.PROXYCURL_API_KEY }}
          LINKEDIN_PROFILE_URL: "https://www.linkedin.com/in/paul-skidmore/"
        run: npx tsx scripts/linkedin-sync.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/certifications.json src/data/experience.json
          git commit -m "chore: sync LinkedIn certifications and experience"
          git push
