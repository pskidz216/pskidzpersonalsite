<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0a14" />
  <title>A puzzle for Mom</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    body {
      background: #1a0a14;
      color: #fff;
      overflow: hidden;
    }

    .welcome-video-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      z-index: -1;
      overflow: hidden;
      background: #1a0a14;
    }
    .welcome-video-backdrop video,
    .welcome-video-backdrop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .welcome-video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 0;
      background: rgba(26, 10, 20, 0.55);
      pointer-events: none;
    }

    .welcome-screen {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(24px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
    }

    .welcome-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 420px;
    }

    .welcome-emoji {
      font-size: 72px;
      margin-bottom: 24px;
      display: inline-block;
    }

    .welcome-headline {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(36px, 9vw, 56px);
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
    }

    .welcome-subtitle {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 48px;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .welcome-cta {
      background: rgba(255, 255, 255, 0.95);
      color: #1a0a14;
      border: none;
      padding: 16px 48px;
      min-height: 48px;
      min-width: 120px;
      font-size: 18px;
      font-weight: 500;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: box-shadow 0.3s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .welcome-cta:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { motion } = window.Motion;
    const { useEffect, useRef, useState } = React;

    function HeroVideo() {
      const videoRef = useRef(null);
      const [useStill, setUseStill] = useState(false);

      useEffect(() => {
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const saveData = !!(navigator.connection && navigator.connection.saveData === true);
        if (reduced || saveData) setUseStill(true);
      }, []);

      useEffect(() => {
        // Some old iOS builds need the legacy attribute set imperatively.
        if (videoRef.current) {
          videoRef.current.setAttribute('webkit-playsinline', 'true');
          // Best-effort autoplay kick (some iOS contexts).
          const p = videoRef.current.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        }
      }, [useStill]);

      if (useStill) {
        return (
          <div className="welcome-video-backdrop" aria-hidden="true">
            <img src="videos/flower-poster.jpg" alt="" />
          </div>
        );
      }

      return (
        <div className="welcome-video-backdrop" aria-hidden="true">
          <video
            ref={videoRef}
            autoPlay
            loop
            muted
            playsInline
            preload="metadata"
            poster="videos/flower-poster.jpg"
            aria-hidden="true"
          >
            <source src="videos/flower-loop-mobile.mp4" type="video/mp4" media="(max-width: 768px)" />
            <source src="videos/flower-loop.mp4" type="video/mp4" />
          </video>
        </div>
      );
    }

    function Welcome({ onStart }) {
      return (
        <>
          <HeroVideo />
          <div className="welcome-video-overlay" aria-hidden="true" />
          <div className="welcome-screen">
            <motion.div
              className="welcome-content"
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, delay: 0.2, ease: [0.16, 1, 0.3, 1] }}
            >
              <motion.div
                className="welcome-emoji"
                animate={{ scale: [1, 1.06, 1] }}
                transition={{ duration: 2.4, repeat: Infinity, ease: 'easeInOut' }}
              >
                💗
              </motion.div>

              <motion.h1
                className="welcome-headline"
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 1, delay: 0.5 }}
              >
                A puzzle for Mom
              </motion.h1>

              <motion.p
                className="welcome-subtitle"
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                transition={{ duration: 1, delay: 0.9 }}
              >
                Solve the puzzle to see your message
              </motion.p>

              <motion.button
                className="welcome-cta"
                onClick={onStart}
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8, delay: 1.3 }}
                whileHover={{ scale: 1.04 }}
                whileTap={{ scale: 0.97 }}
              >
                Begin
              </motion.button>
            </motion.div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Welcome onStart={() => alert('Begin!')} />);
  </script>
</body>
</html>
